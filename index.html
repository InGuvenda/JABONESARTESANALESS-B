<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S&B Jabones Artesanales</title>

<style>
body{
margin:0;
font-family:Segoe UI,Arial;
background:#f5f7f6
}

/* HEADER */
header{
background:linear-gradient(135deg,#6db193,#4a8f74);
color:#fff;
text-align:center;
padding:20px;
position:sticky;
top:0;
z-index:1000;
}

header h1{margin:0;font-size:20px}

/* CATÁLOGO */
.catalogo{padding:20px}

.productos{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px
}

.producto{
background:#fff;
border-radius:12px;
padding:12px;
box-shadow:0 4px 12px rgba(0,0,0,.1);
transition:.3s
}

.producto:hover{
transform:translateY(-5px)
}

.producto img{
width:100%;
height:180px;
object-fit:cover;
border-radius:10px
}

.precio{
color:#4a8f74;
font-weight:bold;
font-size:18px
}

.controles{
display:flex;
gap:8px;
margin-top:10px
}

input{
width:60px;
padding:5px;
font-size:16px
}

button{
background:#6db193;
color:#fff;
border:none;
padding:10px;
border-radius:6px;
cursor:pointer;
flex:1
}

/* BOTÓN FLOTANTE */
.btn-carrito{
position:fixed;
bottom:20px;
right:20px;
background:#4a8f74;
color:#fff;
width:60px;
height:60px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
cursor:pointer;
box-shadow:0 4px 15px rgba(0,0,0,.3);
z-index:3000;
}

.contador{
position:absolute;
top:-5px;
right:-5px;
background:red;
color:#fff;
font-size:12px;
padding:4px 7px;
border-radius:50%;
}

/* PANEL CARRITO */
.panel{
position:fixed;
bottom:-100%;
left:0;
right:0;
background:#fff;
border-radius:15px 15px 0 0;
box-shadow:0 -4px 20px rgba(0,0,0,.3);
padding:15px;
transition:.4s;
z-index:2500;
max-height:70%;
overflow:auto;
}

.panel.active{
bottom:0;
}

.panel h3{
margin-top:0;
}

.cerrar{
float:right;
cursor:pointer;
font-size:18px;
}

ul{
padding-left:15px;
}

/* MOBILE */
@media (max-width:768px){
.productos{
grid-template-columns:1fr;
}
}
</style>

</head>

<body>

<header>
<h1>🌿 S&B Jabones Artesanales</h1>
<p>Esencial con estatus para tu piel</p>
</header>

<section class="catalogo">
<h2>Productos ($30 c/u)</h2>

<div class="productos">

<div class="producto">
<img src="img/jabonCafeFlor.jpg">
<h3>Jabón Flor Café</h3>
<p class="precio">$30</p>
<div class="controles">
<input type="number" id="c1" value="1" min="1">
<button onclick="add('Flor Café',30,'c1')">Agregar</button>
</div>
</div>

<div class="producto">
<img src="img/jabonRectangular.jpg">
<h3>Jabón S&B Azul</h3>
<p class="precio">$30</p>
<div class="controles">
<input type="number" id="c2" value="1" min="1">
<button onclick="add('Azul S&B',30,'c2')">Agregar</button>
</div>
</div>

<div class="producto">
<img src="img/jabonDeCoco.jpg">
<h3>Jabón Coco</h3>
<p class="precio">$30</p>
<div class="controles">
<input type="number" id="c3" value="1" min="1">
<button onclick="add('Coco',30,'c3')">Agregar</button>
</div>
</div>

<div class="producto">
<img src="img/jabonDeMar.jpg">
<h3>Jabón Mar Concha</h3>
<p class="precio">$30</p>
<div class="controles">
<input type="number" id="c4" value="1" min="1">
<button onclick="add('Concha',30,'c4')">Agregar</button>
</div>
</div>

<div class="producto">
<img src="img/jabonDeMarDove.jpg">
<h3>Jabón Mar Pez</h3>
<p class="precio">$30</p>
<div class="controles">
<input type="number" id="c5" value="1" min="1">
<button onclick="add('Pez',30,'c5')">Agregar</button>
</div>
</div>

</div>
</section>

<!-- BOTÓN -->

<div class="btn-carrito" onclick="toggleCart()">
🛒
<span class="contador" id="count">0</span>
</div>

<!-- PANEL -->

<div class="panel" id="panel">
<span class="cerrar" onclick="toggleCart()">✖</span>
<h3>Tu pedido</h3>
<ul id="lista"></ul>
<p>Total: $<span id="total">0</span></p>
<button onclick="comprar()">Comprar por WhatsApp</button>
</div>

<script>
let cart=[];
let total=0;

function add(n,p,id){
let q=document.getElementById(id).value;

for(let i=0;i<q;i++){
cart.push({n,p});
total+=p;
}

update();
}

function update(){
let l=document.getElementById("lista");
l.innerHTML="";

cart.forEach(i=>{
l.innerHTML+="<li>"+i.n+" - $"+i.p+"</li>";
});

document.getElementById("total").innerText=total;
document.getElementById("count").innerText=cart.length;
}

function toggleCart(){
document.getElementById("panel").classList.toggle("active");
}

function comprar(){
let msg="Hola, quiero comprar:\n";

cart.forEach(i=>{
msg+="- "+i.n+"\n";
});

msg+="Total: $"+total;

window.open("https://wa.me/523333945657?text="+encodeURIComponent(msg));
}
</script>

</body>
</html>
